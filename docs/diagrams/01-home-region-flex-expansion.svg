<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1080" role="img" aria-labelledby="title desc">
  <title id="title">Anyscale on AKS with cross-region Flex Node expansion</title>
  <desc id="desc">Architecture showing westus3 home AKS cluster and westus2 Flex GPU nodes joined with AKS Flex Node, with Anyscale dispatching Ray workloads across both regions.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#edf2f7"/>
    </linearGradient>
    <linearGradient id="azureRegion" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ebf8ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="aks" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6fffa"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <linearGradient id="flex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="control" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#059669"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#ea580c"/>
    </marker>
    <style>
      .h1 { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .h2 { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .h3 { font: 700 21px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .label { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .body { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .small { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .accentBlue { fill: #1d4ed8; }
      .accentGreen { fill: #047857; }
      .accentOrange { fill: #c2410c; }
      .panel { stroke: #94a3b8; stroke-width: 1.2; rx: 16; }
      .node { stroke: #64748b; stroke-width: 1.2; rx: 12; }
      .gpu { fill: #0f766e; }
      .cpu { fill: #1d4ed8; }
      .k8s { fill: #0f172a; }
      .dashed { stroke-dasharray: 8 6; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1080" fill="url(#bg)"/>

  <text x="70" y="70" class="h1">Anyscale + AKS Flex Node Multi-Region Design</text>
  <text x="70" y="104" class="label">Home region: westus3 | Flex expansion region: westus2 | Goal: utilize 4x T4 GPUs (64 vCPU quota total)</text>

  <rect x="60" y="140" width="1680" height="860" class="panel" fill="white" filter="url(#shadow)"/>

  <rect x="100" y="190" width="600" height="730" class="panel" fill="url(#azureRegion)"/>
  <text x="130" y="230" class="h2">Region A: westus3 (Home)</text>

  <rect x="130" y="260" width="540" height="400" class="panel" fill="url(#aks)"/>
  <text x="155" y="295" class="h3">AKS Cluster (Control Plane + Native Node Pools)</text>
  <text x="155" y="320" class="small">Public AKS configuration (non-private sample)</text>

  <rect x="155" y="345" width="160" height="90" class="node" fill="#dbeafe"/>
  <text x="171" y="378" class="label">System Pool</text>
  <text x="171" y="400" class="small">Kubernetes infra</text>

  <rect x="335" y="345" width="160" height="90" class="node" fill="#dbeafe"/>
  <text x="365" y="378" class="label">CPU Pool</text>
  <text x="346" y="400" class="small">Ray head/services</text>

  <rect x="515" y="345" width="130" height="90" class="node" fill="#ccfbf1"/>
  <text x="531" y="378" class="label">GPU Pool</text>
  <text x="535" y="400" class="small">2x T4</text>

  <rect x="155" y="470" width="490" height="180" class="node" fill="#ffffff"/>
  <text x="180" y="502" class="label">Ray on Kubernetes (Anyscale-managed workloads)</text>
  <text x="180" y="532" class="body">- Ray head pod and control services schedule in westus3</text>
  <text x="180" y="557" class="body">- Worker groups target GPU capacity in both regions</text>
  <text x="180" y="582" class="body">- Autoscaler reacts to queue depth and placement constraints</text>

  <rect x="130" y="690" width="540" height="215" class="panel" fill="#ffffff"/>
  <text x="155" y="724" class="h3">Anyscale Cloud Binding in Home Region</text>
  <text x="155" y="753" class="body">- Azure Anyscale cloud resource and AKS extension are anchored to westus3 AKS</text>
  <text x="155" y="778" class="body">- Control-plane operations remain egress-initiated from AKS operator</text>
  <text x="155" y="803" class="body">- Compute configs expose CPU and GPU capacity profiles for workload routing</text>
  <text x="155" y="836" class="small">Result: one logical Anyscale cloud managing one AKS cluster with expanded worker footprint</text>

  <rect x="760" y="190" width="600" height="730" class="panel" fill="url(#azureRegion)"/>
  <text x="790" y="230" class="h2">Region B: westus2 (Flex Expansion)</text>

  <rect x="790" y="260" width="540" height="400" class="panel" fill="url(#flex)"/>
  <text x="815" y="295" class="h3">AKS Flex Node Hosts</text>
  <text x="815" y="320" class="small">Joined into the same westus3 AKS cluster</text>

  <rect x="815" y="350" width="240" height="120" class="node" fill="#fff"/>
  <text x="842" y="386" class="label">Flex Host VM 1</text>
  <text x="830" y="410" class="small">Standard_NC16as_T4_v3</text>
  <text x="882" y="434" class="small">1x T4 GPU</text>

  <rect x="1080" y="350" width="240" height="120" class="node" fill="#fff"/>
  <text x="1107" y="386" class="label">Flex Host VM 2</text>
  <text x="1095" y="410" class="small">Standard_NC16as_T4_v3</text>
  <text x="1147" y="434" class="small">1x T4 GPU</text>

  <rect x="815" y="500" width="505" height="150" class="node" fill="#ffffff"/>
  <text x="840" y="534" class="label">AKS Flex Node Agent Responsibilities</text>
  <text x="840" y="560" class="body">- Bootstrap node identity and kubelet registration to home AKS</text>
  <text x="840" y="585" class="body">- Present westus2 GPU workers as schedulable Kubernetes nodes</text>
  <text x="840" y="610" class="body">- Preserve native Kubernetes scheduling model across regions</text>

  <rect x="790" y="690" width="540" height="215" class="panel" fill="#ffffff"/>
  <text x="815" y="724" class="h3">Cross-Region Capacity Contribution</text>
  <text x="815" y="753" class="body">- Adds 2x T4 GPUs (32 vCPU quota) beyond home region capacity</text>
  <text x="815" y="778" class="body">- Enables quota-balanced scale-out without second AKS control plane</text>
  <text x="815" y="803" class="body">- Provides failover-style workload spread when one region is saturated</text>

  <rect x="1420" y="260" width="280" height="630" class="panel" fill="url(#control)"/>
  <text x="1450" y="298" class="h3">Anyscale Control Plane</text>
  <text x="1450" y="322" class="small">console.azure.anyscale.com</text>

  <rect x="1450" y="350" width="220" height="110" class="node" fill="#ffffff"/>
  <text x="1498" y="384" class="label">Scheduler</text>
  <text x="1480" y="408" class="small">Places Ray tasks/actors</text>
  <text x="1486" y="430" class="small">against cluster capacity</text>

  <rect x="1450" y="490" width="220" height="120" class="node" fill="#ffffff"/>
  <text x="1496" y="526" class="label">Observability</text>
  <text x="1471" y="550" class="small">Metrics, logs, utilization</text>
  <text x="1476" y="572" class="small">for proofs and evidence</text>

  <rect x="1450" y="640" width="220" height="120" class="node" fill="#ffffff"/>
  <text x="1486" y="676" class="label">Workspace API</text>
  <text x="1478" y="700" class="small">Jobs and service orchestration</text>
  <text x="1496" y="722" class="small">across one AKS cloud</text>

  <line x1="1360" y1="405" x2="1450" y2="405" stroke="#2563eb" stroke-width="3.2" marker-end="url(#arrowBlue)"/>

  <path d="M 1450 665 C 1320 665, 1220 665, 670 665" fill="none" stroke="#059669" stroke-width="3.2" marker-end="url(#arrowGreen)"/>

  <path d="M 700 450 C 760 450, 770 450, 815 410" fill="none" stroke="#ea580c" stroke-width="4" marker-end="url(#arrowOrange)"/>

  <path d="M 700 612 C 790 636, 780 636, 815 636" fill="none" stroke="#ea580c" stroke-width="3" marker-end="url(#arrowOrange)"/>

  <rect x="1380" y="780" width="320" height="135" rx="10" fill="#ffffff" stroke="#94a3b8"/>
  <text x="1405" y="808" class="label">Flow Legend</text>
  <text x="1405" y="834" class="small accentBlue">Blue: control + scheduling</text>
  <text x="1405" y="858" class="small accentGreen">Green: workload intents + health loops</text>
  <text x="1405" y="882" class="small accentOrange">Orange: Flex join + cross-region path</text>

  <rect x="90" y="945" width="1620" height="52" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="110" y="971" class="small">Dispatch model: Anyscale scheduler sees one AKS cluster capacity graph. AKS Flex Node extends that graph with westus2 GPU nodes,</text>
  <text x="110" y="991" class="small">so Ray workers can be placed in either region while the control anchor remains westus3.</text>
</svg>
