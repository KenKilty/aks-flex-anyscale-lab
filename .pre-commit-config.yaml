repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.10
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        files: ^workloads/.*\.py$

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: ^scripts/.*\.sh$

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: [-i, "2", -w]
        files: ^scripts/.*\.sh$

  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: markdownlint-cli2 --config .markdownlint-cli2.jsonc
        language: system
        files: \.(md|mdx|markdown)$

      - id: terraform-fmt-validate
        name: terraform fmt and validate
        entry: scripts/lint-terraform.sh
        language: system
        files: ^infra/terraform/.*\.tf$
        pass_filenames: false

      - id: typescript-typecheck
        name: TypeScript typecheck
        entry: npm run typecheck
        language: system
        files: ^(docusaurus\.config\.ts|sidebars\.ts|src/.*\.(ts|tsx))$
        pass_filenames: false

      - id: npm-audit-gate
        name: npm security audit
        entry: scripts/audit-npm.sh
        language: system
        files: ^package\.json$
        pass_filenames: false
        always_run: true
